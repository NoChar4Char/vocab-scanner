<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocab Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div>
      <div class="app-name">Vocab Scanner</div>
      <div class="app-sub">SAT · GRE · Academic</div>
    </div>
    <div class="header-actions">
      <button id="masterBtn" class="btn-outline">Master PDF</button>
      <button id="clearBtn" class="btn-danger-outline">Clear List</button>
    </div>
  </header>

  <!-- Source bar -->
  <div id="sourceBar" class="source-bar hidden">
    <span id="sourceType" class="source-type">WEB</span><span id="sourceLabel">—</span>
  </div>

  <!-- Scan section -->
  <div class="scan-section">
    <button id="scanBtn" class="btn-scan">
      <span id="scanText">Scan Page</span>
    </button>
    <div id="statusMsg" class="status-msg"></div>
  </div>

  <!-- Stats bar -->
  <div id="statsBar" class="stats-bar hidden">
    <span id="wordCount" class="stat">0 words</span>
    <span class="stat-sep">·</span>
    <span id="savedCount" class="stat">0 saved</span>
    <button id="selectAll" class="btn-tiny" style="margin-left:auto">Select All</button>
    <button id="deselectAll" class="btn-tiny">None</button>
  </div>

  <!-- Word list -->
  <div id="wordList" class="word-list"></div>

  <!-- Empty state -->
  <div id="emptyState" class="empty-state">
    <div class="empty-title">No words yet</div>
    <div class="empty-sub">Click Scan Page to detect advanced vocabulary on the current page or PDF.</div>
  </div>

  <!-- Footer -->
  <div id="footer" class="footer hidden">
    <button id="saveBtn" class="btn-primary">Save Selected</button>
    <button id="scanPdfBtn" class="btn-secondary">Download PDF</button>
  </div>

  <script src="libs/pdf.min.js"></script>
  <script src="libs/jspdf.umd.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
